version: '3.8'

services:
  # Database Service (PostgreSQL + pgvector)
  db:
    image: pgvector/pgvector:pg15
    # Dùng image pgvector được build sẵn trên nền Postgres 15 thay cho postgres thuần
    container_name: edu_rag_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: edu_rag_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Backend Service (FastAPI)
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: edu_rag_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      # URL trỏ tới service db nội bộ trong Docker network
      - POSTGRES_SERVER=db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=edu_rag_db
    volumes:
      # Mount code trực tiếp vào container để hỗ trợ live-reload
      - ./backend:/app
    depends_on:
      - db

  # Frontend Service (React/Vite)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: edu_rag_frontend
    restart: always
    ports:
      - "5173:5173"
    environment:
      # Báo cho frontend biết API đang chạy ở đâu
      - VITE_API_URL=http://localhost:8000/api/v1
    volumes:
      # Mount source code frontend vào container, bỏ qua thư mục node_modules
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
